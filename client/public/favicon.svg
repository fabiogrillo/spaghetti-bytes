<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Stylized "S" — a single noodle-strand / data-flow curve.
       Thick stroke, round caps, no fill — reads clearly at 16 px. -->
  <path
    d="M 310 130
       C 310 130, 355 150, 355 205
       C 355 260, 256 260, 256 260
       C 256 260, 157 260, 157 310
       C 157 365, 202 385, 202 385"
    fill="none"
    stroke="white"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Two tiny accent dots — like data packets travelling the noodle -->
  <circle cx="326" cy="152" r="16" fill="white" opacity="0.55"/>
  <circle cx="186" cy="364" r="16" fill="white" opacity="0.55"/>
</svg>
